spring:
  application:
    name: backend-compas
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/student_compass}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /api-docs

app:
  jwt:
    secret: ${JWT_SECRET:student-compass-jwt-secret-key-must-be-at-least-32-bytes}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:10}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
  auth:
    secure-cookies: ${AUTH_SECURE_COOKIES:false}
    refresh-cookie-path: /api/v1/auth
  ai:
    base-url: ${AI_BASE_URL:https://circulate-gratify-spookily.ngrok-free.dev}
    internal-secret: ${AI_INTERNAL_SECRET:dev-internal-secret}

ai:
  service:
    url: ${AI_SERVICE_URL:${AI_BASE_URL:https://circulate-gratify-spookily.ngrok-free.dev}}
    secret: ${AI_SERVICE_SECRET:${AI_INTERNAL_SECRET:dev-internal-secret}}
