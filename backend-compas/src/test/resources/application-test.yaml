spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/student_compas_test}
    username: ${TEST_DB_USERNAME:user}
    password: ${TEST_DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test-student-compass-jwt-secret-key-must-be-at-least-32-bytes
    access-token-minutes: 10
    refresh-token-days: 7
  auth:
    secure-cookies: false
    refresh-cookie-path: /api/v1/auth
