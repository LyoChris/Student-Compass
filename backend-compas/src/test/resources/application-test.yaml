spring:
  datasource:
    url: jdbc:h2:mem:studentcompass;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test-student-compass-jwt-secret-key-must-be-at-least-32-bytes
    access-token-minutes: 10
    refresh-token-days: 7
  auth:
    secure-cookies: false
    refresh-cookie-path: /api/v1/auth
