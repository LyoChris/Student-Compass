services:
  db:
    image: postgres:15-alpine
    container_name: student-db
    environment:
      POSTGRES_DB: student-compas
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      # Mapam scriptul ca să creeze a doua bază de date la prima pornire
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d student-compas"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: compas-backend
    ports:
      - "8067:8067"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - SERVER_PORT=8067
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL must be set}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME must be set}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD must be set}
      - SPRING_FLYWAY_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
