version: "3.9"

services:
  ai:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - AI_SERVICE_SHARED_SECRET=${AI_SERVICE_SHARED_SECRET:-dev-internal-secret}
      - DATABASE_URL=${DATABASE_URL:-sqlite+pysqlite:///:memory:}
      - OLLAMA_BASE_URL=http://localhost:11434
      - OLLAMA_MODEL=llama3
